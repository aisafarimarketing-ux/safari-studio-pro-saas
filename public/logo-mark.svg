<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Safari Studio mark">
  <!-- Brand mark for tight UI spaces (toolbar, email signatures,
       social-share fallback). Same "S" monogram + hairline diamond
       motif as the favicon, sized for clarity at ~32-64px. -->
  <rect width="64" height="64" rx="10" fill="#1f3a3a" />

  <path
    d="M32 12 L52 32 L32 52 L12 32 Z"
    fill="none"
    stroke="#c89668"
    stroke-width="1"
    opacity="0.5"
  />

  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="40"
    font-weight="600"
    fill="#c89668"
  >S</text>
</svg>
