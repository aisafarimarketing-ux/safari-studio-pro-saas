[build]
builder = "dockerfile"

[deploy]
# pdf-service is an Express server (index.js) — its only HTTP routes
# are "/" (status JSON), "/diag", and "/pdf". The repo-root
# railway.toml points at /api/version (the Next.js app's endpoint)
# which does not exist on this service. This file overrides
# healthcheckPath back to "/" for pdf-service only. Both railway.toml
# files only apply to the service whose Root Directory matches their
# own location — no path tweaks needed beyond that.
healthcheckPath = "/"
healthcheckTimeout = 300

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
