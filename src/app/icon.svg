<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Safari Studio">
  <!-- Browser-tab favicon. Single bold "S" monogram in copper on a
       deep-teal rounded square — reads clean at 16×16 where the
       previous diamond + faceted triangles smudged into a vague
       play-button shape. -->
  <rect width="32" height="32" rx="6" fill="#1f3a3a" />
  <text
    x="16"
    y="23"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="600"
    letter-spacing="0"
    fill="#c89668"
  >S</text>
</svg>
