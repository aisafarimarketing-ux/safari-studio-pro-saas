<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="Safari Studio">
  <!-- iOS home-screen icon — same monogram as the favicon, scaled up
       and with a hairline copper diamond as a quiet decoration that
       only reads at this larger size. Same rounded-square background
       Apple's icons use. -->
  <rect width="180" height="180" rx="38" fill="#1f3a3a" />

  <!-- Hairline diamond — visible at 180px+, invisible at favicon scale -->
  <path
    d="M90 30 L150 90 L90 150 L30 90 Z"
    fill="none"
    stroke="#c89668"
    stroke-width="1.5"
    opacity="0.4"
  />

  <!-- "S" monogram, dominant element -->
  <text
    x="90"
    y="120"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="120"
    font-weight="600"
    fill="#c89668"
  >S</text>
</svg>
