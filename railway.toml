[build]
builder = "dockerfile"

[deploy]
# Let the Dockerfile's CMD drive startup. Removing the inline
# startCommand — earlier attempts to pass -H/-p flags via a string
# command may not interpolate ${PORT} reliably across Railway's
# build runners and could be why every deploy got "service
# unavailable" (next start receiving an unexpanded literal).
# next start auto-binds to 0.0.0.0:$PORT when PORT is in env,
# which Railway always injects.

# /api/version is unauthenticated, runs no DB query, doesn't touch
# Clerk, doesn't render React — just returns JSON. Always 200 if
# the Node process is alive, which is what a healthcheck should
# mean.
healthcheckPath = "/api/version"
healthcheckTimeout = 300

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
